name: Apply Runtime UX Stabilization Patch

on:
  push:
    branches:
      - pre-backend-test
    paths:
      - '.github/workflows/apply-runtime-ux-stabilization.yml'

permissions:
  contents: write

jobs:
  apply-runtime-ux-stabilization:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: pre-backend-test

      - name: Apply targeted runtime UX patch
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/runtime_remaining.patch <<'PATCH_EOF'
