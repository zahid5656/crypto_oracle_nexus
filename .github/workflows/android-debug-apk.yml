name: Build Android Debug APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: "Gradle build task"
        required: true
        default: "assembleDebug"
        type: choice
        options:
          - assembleDebug
          - clean assembleDebug
  push:
    branches:
      - pre-backend-test
      - pre-backend-test-remaining-ui

permissions:
  contents: read

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4096m -Dfile.encoding=UTF-8"
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  build-debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses >/dev/null || true

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: current

      - name: Show build environment
        run: |
          java -version
          gradle --version
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"

      - name: Build debug APK
        shell: bash
        run: |
          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
            ./gradlew ${{ github.event.inputs.build_type || 'assembleDebug' }} --stacktrace --no-daemon
          else
            gradle ${{ github.event.inputs.build_type || 'assembleDebug' }} --stacktrace --no-daemon
          fi

      - name: Generate timestamped artifact name
        id: artifact_name
        shell: bash
        run: |
          FILE_TS="$(TZ='Asia/Dhaka' date '+%H-%M-%S-%d-%B-%y')"
          ARTIFACT_NAME="crypto-oracle-nexus-debug-[${FILE_TS}]-apk"
          echo "artifact_name=$ARTIFACT_NAME" >> "$GITHUB_OUTPUT"
          echo "ZIP download name will be: $ARTIFACT_NAME.zip"

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.artifact_name }}
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build reports on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: crypto-oracle-nexus-build-reports
          path: |
            **/build/reports/**
            **/build/outputs/logs/**
          if-no-files-found: ignore
          retention-days: 7
