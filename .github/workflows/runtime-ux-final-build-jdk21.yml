name: Runtime UX Final Build JDK21

on:
  workflow_dispatch:
  push:
    branches:
      - pre-backend-test-runtime-ux-final
    paths:
      - '.github/workflows/runtime-ux-final-build-jdk21.yml'

permissions:
  contents: write

env:
  GRADLE_OPTS: -Dorg.gradle.daemon=false -Dorg.gradle.jvmargs="-Xmx4096m -Dfile.encoding=UTF-8"
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  build-jdk21:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: pre-backend-test-runtime-ux-final
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --install "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses >/dev/null

      - name: Remove temporary workflow from branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/runtime-ux-final-build-jdk21.yml
          git commit -m "chore: remove temporary runtime UX final build workflow" || true
          git push origin HEAD:pre-backend-test-runtime-ux-final

      - name: Build debug APK with JDK 21
        shell: bash
        run: |
          set -euo pipefail
          java -version
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug --stacktrace --no-daemon
          else
            gradle assembleDebug --stacktrace --no-daemon
          fi
