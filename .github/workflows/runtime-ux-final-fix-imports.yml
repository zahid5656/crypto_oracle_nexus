name: Runtime UX Final Fix Imports

on:
  workflow_dispatch:
  push:
    branches:
      - pre-backend-test-runtime-ux-final
    paths:
      - '.github/workflows/runtime-ux-final-fix-imports.yml'

permissions:
  contents: write

jobs:
  fix-imports-build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: pre-backend-test-runtime-ux-final
          fetch-depth: 0

      - name: Fix misplaced Kotlin imports
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('app/src/main/java/com/example/feature/signal_pro/SignalProComponentsPart3.kt')
          s = path.read_text()
          helper_re = re.compile(r'\nprivate fun spLeverageDigitsOnly\(value: String\?\): String = value\.orEmpty\(\)\.filter \{ it\.isDigit\(\) \}\.take\(3\)\n\nprivate fun spLeverageDisplayValue\(value: String\?\): String \{\n    val digits = spLeverageDigitsOnly\(value\)\n    return if \(digits\.isBlank\(\)\) "" else "\$\{digits\}X"\n\}\n')
          helper_match = helper_re.search(s)
          if not helper_match:
              raise SystemExit('Expected leverage helper block not found')
          helper = helper_match.group(0).strip() + '\n'
          s = helper_re.sub('\n', s, count=1)

          lines = s.splitlines()
          last_import = None
          for i, line in enumerate(lines):
              if line.startswith('import '):
                  last_import = i
          if last_import is None:
              raise SystemExit('No import block found')
          lines.insert(last_import + 1, '')
          lines.insert(last_import + 2, helper.rstrip())
          s = '\n'.join(lines) + '\n'

          # Validate no import exists after first non-import code line.
          seen_code = False
          for idx, line in enumerate(s.splitlines(), start=1):
              stripped = line.strip()
              if not stripped or stripped.startswith('package ') or stripped.startswith('import '):
                  if stripped.startswith('import ') and seen_code:
                      raise SystemExit(f'Misplaced import remains at line {idx}')
                  continue
              seen_code = True

          path.write_text(s)
          PY
          git diff --check

      - name: Commit import fix and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/runtime-ux-final-fix-imports.yml
          git add app/src/main/java/com/example/feature/signal_pro/SignalProComponentsPart3.kt
          git commit -m "fix: restore Signal Pro import ordering" -m "- Move leverage helper below the complete import block" -m "- Resolve Kotlin imports-only-at-file-beginning compile error"
          git push origin HEAD:pre-backend-test-runtime-ux-final

      - name: Build debug APK
        shell: bash
        run: |
          set -euo pipefail
          if [ -f ./gradlew ]; then
            chmod +x ./gradlew
            ./gradlew assembleDebug --stacktrace --no-daemon
          else
            gradle assembleDebug --stacktrace --no-daemon
          fi
